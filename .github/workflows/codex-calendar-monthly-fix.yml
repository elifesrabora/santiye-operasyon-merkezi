name: Codex Monthly Calendar Fix

on:
  push:
    paths:
      - '.codex-runs/calendar-monthly-fix-2026-05-07.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply monthly calendar fix
        run: node scripts/codex-calendar-monthly-fix.js
      - name: Verify JavaScript
        run: node --check assets/scripts/app.js
      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add index.html assets/scripts/app.js assets/styles/main.css
          git commit -m "Fix monthly calendar layout and task placement"
          git push
