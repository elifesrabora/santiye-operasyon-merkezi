name: Codex Login Fix

on:
  push:
    paths:
      - '.codex-runs/login-fix-2026-05-07.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply login fix
        run: node scripts/codex-login-fix.js
      - name: Verify JavaScript
        run: |
          node --check assets/scripts/app.js
          cp google-apps-script.gs /tmp/google-apps-script-check.js
          node --check /tmp/google-apps-script-check.js
      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add assets/scripts/app.js google-apps-script.gs
          git commit -m "Fix login compatibility with Sheets users"
          git push
