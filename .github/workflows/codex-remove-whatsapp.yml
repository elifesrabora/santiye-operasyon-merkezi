name: Codex Remove WhatsApp

on:
  push:
    paths:
      - '.codex-runs/remove-whatsapp-2026-05-09.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Remove WhatsApp functionality
        run: node scripts/codex-remove-whatsapp.js
      - name: Verify JavaScript
        run: node --check assets/scripts/app.js
      - name: Commit website cleanup
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add assets/scripts/app.js index.html assets/styles/main.css
          git commit -m "Remove WhatsApp notification UI"
          git push
