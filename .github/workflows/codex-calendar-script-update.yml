name: Codex Calendar Script Update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply calendar patch
        run: node scripts/codex-calendar-followup-patch.js
      - name: Verify
        run: |
          node --check assets/scripts/app.js
          ! grep -q '\\n' assets/styles/main.css
          grep -q 'settings-whatsapp-numbers' index.html
          grep -q 'renderWhatsappLinks' assets/scripts/app.js
      - name: Commit changes
        run: |
          git config user.name "codex-update-bot"
          git config user.email "codex-update-bot@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add index.html assets/scripts/app.js assets/styles/main.css
          git commit -m "Update calendar follow-up view"
          git push
