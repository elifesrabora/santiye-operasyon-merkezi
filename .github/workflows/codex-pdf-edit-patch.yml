name: Codex PDF edit patch

on:
  push:
    branches:
      - main
    paths:
      - ".codex-pdf-edit-trigger"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply PDF and edit patch
        run: python .github/scripts/codex_patch_pdf_edit.py
      - name: Verify JavaScript
        run: |
          node --check assets/scripts/app.js
          cp google-apps-script.gs /tmp/google-apps-script-check.js
          node --check /tmp/google-apps-script-check.js
      - name: Commit patch
        run: |
          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Fix PDF Turkish text and record editing"
          git push
