name: Codex app js patch

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app.js
        run: python .github/scripts/codex_patch_app_js.py
      - name: Commit patch
        run: |
          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Apply token protected frontend integration"
          git push
