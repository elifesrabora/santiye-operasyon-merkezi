    setConnectionPill();
    setView("settings");
    return;
  }
  try {''')

          text = text.replace('''    const url = new URL(state.settings.apiBaseUrl);
    url.searchParams.set("resource", "bootstrap");
    const response = await fetch(url.toString(), { method: "GET" });''', '''    const url = new URL(state.settings.apiBaseUrl);
