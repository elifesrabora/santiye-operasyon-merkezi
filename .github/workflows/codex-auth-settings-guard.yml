name: Codex Auth Settings Guard

on:
  push:
    paths:
      - '.codex-runs/auth-settings-guard-2026-05-09.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply auth and settings guard patch
        run: node scripts/codex-auth-settings-guard.js
      - name: Verify JavaScript
        run: node --check assets/scripts/app.js
      - name: Commit changes
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add assets/scripts/app.js
          git commit -m "Harden login and settings recovery"
          git push
