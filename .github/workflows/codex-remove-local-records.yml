name: Codex Remove Local Records

on:
  push:
    paths:
      - '.codex-runs/remove-local-records-2026-05-09.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Remove local record mode
        run: node scripts/codex-remove-local-records.js
      - name: Verify JavaScript
        run: node --check assets/scripts/app.js
      - name: Commit website cleanup
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add assets/scripts/app.js index.html
          git commit -m "Use Sheets as the only record source"
          git push
