name: Codex Fix Sheets Boot

on:
  push:
    paths:
      - '.codex-runs/fix-sheets-boot-2026-05-09.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fix Sheets boot behavior
        run: node scripts/codex-fix-sheets-boot.js
      - name: Verify JavaScript
        run: node --check assets/scripts/app.js
      - name: Commit website fix
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add assets/scripts/app.js
          git commit -m "Prevent Sheets status from hanging"
          git push
