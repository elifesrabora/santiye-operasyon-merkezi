name: Codex document filters

on:
  push:
    branches:
      - main
    paths:
      - ".codex-document-filters-trigger"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply document filters patch
        run: python .github/scripts/codex_patch_document_filters.py
      - name: Verify JavaScript
        run: node --check assets/scripts/app.js
      - name: Commit patch
        run: |
          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Add document archive filters"
          git push
